<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>NetflixLight</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-black text-white">

<header class="navbar">

<h1 class="logo">
NetflixLight
</h1>

<nav class="menu">

<a href="#">Accueil</a>
<a href="#">Films</a>
<a href="#">Séries</a>

</nav>

<input
type="text"
placeholder="Rechercher..."
class="search"
/>

</header>

<main>

<section class="hero-banner">

<div class="hero-overlay"></div>

<div class="hero-content">

<h1 class="hero-title">
Featured Movie
</h1>

<p class="hero-description">
Un film populaire affiché dans la bannière principale.
</p>

<div class="hero-buttons">

<button class="play-btn">
▶ Lecture
</button>

<button class="info-btn">
Plus d'infos
</button>

</div>

</div>

</section>


<section class="carousel-section">

<h2>Trending Now</h2>

<div class="carousel">

<div class="movie-card"></div>
<div class="movie-card"></div>
<div class="movie-card"></div>
<div class="movie-card"></div>

</div>

</section>


<section class="carousel-section">

<h2>Popular Movies</h2>

<div class="carousel">

<div class="movie-card"></div>
<div class="movie-card"></div>
<div class="movie-card"></div>

</div>

</section>

</main>

</body>
</html>
